name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:        # allow manual trigger from the Actions tab

# GitHub Pages deploy permissions
permissions:
  contents: read
  pages: write
  id-token: write

# Cancel any older in-flight runs so the latest push wins
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

# Opt every actions/* step into Node 24 ahead of the June 2026 default flip
# (silences the "Node.js 20 actions are deprecated" warning). When GitHub
# ships Node-24-native versions of these actions, this env can be removed.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (next export → out/)
        env:
          NEXT_PUBLIC_BASE_PATH: /shakespeare-in-the-republic
        run: npm run build

      - name: Disable Jekyll (so /_next/ files are served)
        run: touch out/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
